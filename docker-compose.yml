version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: aiquiz-db
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quizpass
      POSTGRES_DB: quizdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: aiquiz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiquiz-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://quiz:quizpass@db:5432/quizdb
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-production-secret-key-change-this
      CORS_ORIGINS: '["http://localhost:5173"]'
      UPLOAD_DIR: /app/uploads
      LLM_API_URL: ""
      LLM_API_KEY: ""
      LLM_MODEL: ""
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # Vue3 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiquiz-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  uploads_data:
