# Nginx 统一配置：Postcards + TILIAN 共用服务器
# 适用场景：两个项目分别使用子域名
# 例如：postcards.example.com 和 tilian.example.com
#
# 注意：当前服务器为火山引擎 ECS，公网 IP 115.190.7.207，无域名。
# 因此当前生产环境应使用 postcards-tilian-path.conf（单 IP 路径隔离方案）。
# 本文件仅在后续申请域名后启用。
#
# 部署步骤：
# 1. 修改 server_name 为实际域名
# 2. 将此文件放入 /etc/nginx/conf.d/
# 3. nginx -t && systemctl reload nginx

# ============================================================
# Postcards（旅行邮箱）H5 + API
# ============================================================
server {
    listen 80;
    server_name postcards.example.com;  # TODO: 替换为实际域名

    # 用户上传图片静态文件
    location /uploads/ {
        alias /data/postcards/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # 邮票素材
    location /stamps/ {
        alias /data/postcards/stamps/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # API 反代到 Postcards Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 文件上传大小限制
        client_max_body_size 15M;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # H5 静态资源
    location / {
        alias /data/postcards/h5/;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}

# ============================================================
# TILIAN（题炼）H5 + API
# ============================================================
server {
    listen 80;
    server_name tilian.example.com;  # TODO: 替换为实际域名

    # 学习文档上传静态文件
    location /uploads/ {
        alias /data/tilian/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # API 反代到 TILIAN FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 文件上传大小限制
        client_max_body_size 15M;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8001;
    }

    # H5 静态资源
    location / {
        alias /data/tilian/dist/;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}
