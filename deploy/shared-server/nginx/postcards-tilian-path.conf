# Nginx 统一配置：Postcards + TILIAN 共用服务器（单 IP 路径隔离方案）
# 访问方式：
#   - http://115.190.7.207/           → Postcards H5
#   - http://115.190.7.207/api/*      → Postcards API
#   - http://115.190.7.207/uploads/*  → Postcards 上传文件
#   - http://115.190.7.207/tilian/    → TILIAN H5
#   - http://115.190.7.207/tilian/api/* → TILIAN API
#   - http://115.190.7.207/tilian/uploads/* → TILIAN 上传文件
#
# 前置要求：
# 1. TILIAN 前端 vite.config.ts 中设置 base: '/tilian/'
# 2. TILIAN 前端 .env.production 中设置 VITE_API_BASE_URL=/tilian/api
# 3. TILIAN 后端 API_V1_PREFIX 保持 /api 不变

server {
    listen 80;
    server_name 115.190.7.207;  # TODO: 替换为实际 IP 或域名

    # ============================================================
    # Postcards 上传文件
    # ============================================================
    location /uploads/ {
        alias /data/postcards/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Postcards 邮票素材
    location /stamps/ {
        alias /data/postcards/stamps/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ============================================================
    # Postcards API
    # ============================================================
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 15M;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # ============================================================
    # TILIAN 上传文件
    # ============================================================
    location /tilian/uploads/ {
        alias /data/tilian/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ============================================================
    # TILIAN API
    # 注意：proxy_pass 末尾带 /，Nginx 转发时会去掉 /tilian/ 前缀
    # ============================================================
    location /tilian/api/ {
        proxy_pass         http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 15M;
    }

    location /tilian/health {
        proxy_pass http://127.0.0.1:8001/health;
    }

    # ============================================================
    # TILIAN H5 静态资源
    # ============================================================
    location /tilian/ {
        alias /data/tilian/dist/;
        try_files $uri $uri/ /tilian/index.html;
        index index.html;
    }

    # ============================================================
    # Postcards H5 静态资源（默认根路径）
    # ============================================================
    location / {
        alias /data/postcards/h5/;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}
