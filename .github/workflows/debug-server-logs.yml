name: Debug Server Logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch backend logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            journalctl -u tilian-backend -n 200 --no-pager
            echo "--- app stderr ---"
            tail -n 100 /data/logs/tilian/error.log 2>/dev/null || true
            echo "--- nginx error ---"
            tail -n 60 /var/log/nginx/error.log
