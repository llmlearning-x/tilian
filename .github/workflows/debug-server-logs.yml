name: Debug Server Logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch backend logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            journalctl -u tilian-backend -n 40 --no-pager
            echo "--- app stderr tail ---"
            tail -n 120 /data/logs/tilian/error.log 2>/dev/null || true
            echo "--- quiz start errors ---"
            grep -n -A8 "start_quiz\|IntegrityError\|UNIQUE" /data/logs/tilian/error.log | tail -80 || true
            echo "--- nginx error ---"
            tail -n 20 /var/log/nginx/error.log
