name: Debug Server Logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect service and permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            systemctl cat tilian-backend
            echo "--- /data/tilian permissions ---"
            ls -la /data/tilian/
            ls -la /data/tilian/backend/
            echo "--- process user ---"
            ps -o user,pid,cmd -p $(pgrep -f "gunicorn.*tilian" | head -1) 2>/dev/null || true
            echo "--- latest backend errors ---"
            tail -n 30 /data/logs/tilian/error.log 2>/dev/null || true
