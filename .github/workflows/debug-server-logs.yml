name: Debug Server Logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch backend logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            journalctl -u tilian-backend -n 20 --no-pager
            echo "--- latest quiz start error details ---"
            LATEST=$(grep -n "start_quiz" /data/logs/tilian/error.log | tail -1 | cut -d: -f1)
            if [ -n "$LATEST" ]; then
              sed -n "$((LATEST-15)),$((LATEST+30))p" /data/logs/tilian/error.log
            fi
            echo "--- nginx error ---"
            tail -n 10 /var/log/nginx/error.log
